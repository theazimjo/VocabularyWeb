version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vocabry-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vocabry
    ports:
      - "51234:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
